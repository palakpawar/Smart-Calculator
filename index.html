<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
        <!-- <button class="theme-btn1" onclick="voiceCalculator()">🎤</button> -->
        <div class="display-container"><input type="text" id="display" readonly placeholder="0">
        </div>
        <div class="buttons">
            <button onclick="clearDisplay()" class="action-btn">AC</button>
            <button onclick="backspace()" class="action-btn">⌫</button>
            <button onclick="appendValue('+/-')" class="action-btn">+/-</button>
            <button onclick="appendValue('/')">➗</button>
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('x')">✖️</button>
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">➖</button>
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')" class="operator">➕</button>
            <button onclick="appendValue('%')">%</button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="calculate( )" class="equal">🟰</button>
        </div>
        <div class="history">
        <h3>History</h3>
        <ul id="historyList"></ul>
        <button onclick="clearHistory()">Clear History</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
